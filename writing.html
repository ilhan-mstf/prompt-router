<style>
/* ── Tokens ──────────────────────────────────────────────────── */
:root {
  --bg:        #0f0f10;
  --surface:   #1a1a1c;
  --surface-2: #222225;
  --border:    #2c2c30;
  --border-2:  #404046;
  --text:      #f0ece4;
  --text-2:    #c5c0b9;
  --text-3:    #8a8580;
  --gold:      #d4a847;
  --gold-dim:  #9a7830;
  --gold-glow: rgba(212,168,71,.1);
  --focus:     #d4a847;

  --chatgpt:    #10a37f;
  --claude:     #c8845a;
  --gemini:     #4285f4;
  --copilot:    #7b6fcc;
  --perplexity: #17b0a7;
  --lechat:     #f06830;
  --grok:       #aaaaaa;
  --deepseek:   #4d6bfe;

  --xs:   0.9rem;
  --sm:   1.05rem;
  --base: 1.1875rem;
  --lg:   1.25rem;
  --2xl:  2.625rem;

  --r:    8px;
  --r-lg: 12px;
  --max:  700px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:        #f4f0e8;
    --surface:   #fdfaf5;
    --surface-2: #f0ece2;
    --border:    #e0dbd0;
    --border-2:  #c8c2b4;
    --text:      #1a1714;
    --text-2:    #3d3832;
    --text-3:    #736d65;
    --gold:      #7a5518;
    --gold-dim:  #9a6c28;
    --gold-glow: rgba(122,85,24,.07);
    --focus:     #7a5518;
  }
}

/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--base);
  line-height: 1.65;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Skip link ───────────────────────────────────────────────── */
.skip {
  position: absolute; top: -100%; left: 16px;
  background: var(--gold); color: var(--bg);
  font-size: var(--sm); padding: 8px 16px;
  border-radius: 0 0 var(--r) var(--r);
  text-decoration: none; z-index: 999; transition: top .15s;
}
.skip:focus { top: 0; outline: none; }

/* ── Focus ───────────────────────────────────────────────────── */
:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: var(--r); }
:focus:not(:focus-visible) { outline: none; }

/* ── Page shell ──────────────────────────────────────────────── */
.page { width: 100%; max-width: var(--max); padding: 0 28px; }

/* ── Top bar ─────────────────────────────────────────────────── */
.topbar {
  width: 100%; background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: center;
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  background: color-mix(in srgb, var(--surface) 85%, transparent);
}
.topbar-inner {
  width: 100%; max-width: var(--max); padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between;
}

h1.logo {
  font-size: inherit; font-weight: inherit; margin: 0;
}
.logo a { text-decoration: none; display: flex; align-items: baseline; gap: 6px; }
.logo-a {
  font-family: 'Fraunces', Georgia, serif;
  font-optical-sizing: auto; font-weight: 600;
  font-size: 1.65rem; letter-spacing: -0.03em;
  line-height: 1; color: var(--text);
}
.logo-b {
  font-family: 'Fraunces', Georgia, serif;
  font-optical-sizing: auto; font-weight: 200; font-style: italic;
  font-size: 1.65rem; letter-spacing: -0.02em;
  line-height: 1; color: var(--gold);
}

.nav-links {
  display: flex; gap: 4px; align-items: center;
}
.nav-links a {
  font-size: var(--xs); color: var(--text-2);
  text-decoration: none; letter-spacing: 0.03em;
  font-weight: 500;
  padding: 6px 12px; border-radius: 100px;
  transition: color .12s, background .12s;
  white-space: nowrap;
}
.nav-links a:hover { color: var(--text); background: var(--surface-2); }
.nav-links a.active {
  color: var(--gold); background: var(--gold-glow);
}
.nav-sep {
  width: 1px; height: 16px; background: var(--border);
  margin: 0 4px; flex-shrink: 0;
}

/* ── Header ──────────────────────────────────────────────────── */
header.page { padding-top: 40px; padding-bottom: 40px; }

.tagline {
  font-size: var(--sm); color: var(--text-3);
  letter-spacing: 0.01em; line-height: 1;
}

/* ── Main ────────────────────────────────────────────────────── */
main.page { padding-bottom: 86px; display: flex; flex-direction: column; gap: 40px; }

/* ── Section labels ──────────────────────────────────────────── */
.lbl {
  display: block;
  font-family: 'Fraunces', Georgia, serif;
  font-size: var(--xs); letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-2);
  font-weight: 600; margin-bottom: 12px;
}

/* ── Category chips ──────────────────────────────────────────── */
.cats { display: flex; flex-wrap: wrap; gap: 7px; }
.cat {
  padding: 7px 14px; background: none;
  border: 1px solid var(--border); border-radius: 100px;
  color: var(--text-2); font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--xs); letter-spacing: 0.03em; line-height: 1;
  cursor: pointer; user-select: none;
  transition: color .12s, border-color .12s, background .12s;
}
.cat:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-glow); }
.cat.active { color: var(--gold); border-color: var(--gold); background: var(--gold-glow); }

/* ── Prompt cards ────────────────────────────────────────────── */
.prompt-cards { display: flex; flex-direction: column; gap: 10px; }

.prompt-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px 18px;
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.prompt-card:hover { border-color: var(--border-2); background: var(--surface-2); }
.prompt-card.selected { border-color: var(--gold); background: var(--gold-glow); }

.prompt-card-title {
  font-size: var(--sm); font-weight: 500; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
}
.prompt-card-preview {
  font-size: var(--xs); color: var(--text-3);
  line-height: 1.5; white-space: pre-line;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.prompt-card.selected .prompt-card-preview {
  -webkit-line-clamp: unset;
  color: var(--text-2);
}

/* ── Textarea ────────────────────────────────────────────────── */
.prompt-wrap { position: relative; }
textarea {
  display: block; width: 100%; min-height: 210px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace; font-size: var(--base);
  line-height: 1.75; padding: 20px 20px 50px;
  resize: vertical; outline: none; caret-color: var(--gold);
  transition: border-color .18s, box-shadow .18s;
}
textarea::placeholder { color: var(--text-3); font-style: italic; }
textarea:hover { border-color: var(--border-2); }
textarea:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }

.prompt-meta {
  position: absolute; bottom: 15px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.char-count {
  font-size: var(--xs); color: var(--text-3);
  font-variant-numeric: tabular-nums; transition: color .2s;
}
.char-count.warn { color: #c97a40; }

/* ── Provider cards ──────────────────────────────────────────── */
.providers {
  list-style: none;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.p-btn {
  width: 100%; display: flex; flex-direction: column;
  align-items: flex-start; gap: 10px; padding: 14px 14px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace; cursor: pointer;
  transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;
  text-align: left; position: relative; overflow: hidden;
}
.p-btn:hover {
  background: var(--surface-2); border-color: var(--border-2);
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.18);
}
.p-btn:active { transform: translateY(0); box-shadow: none; }
.p-dot {
  width: 28px; height: 4px; border-radius: 2px;
  background: var(--pc, var(--border)); opacity: .65;
  transition: opacity .12s, width .12s;
}
.p-btn:hover .p-dot { opacity: 1; width: 36px; }
.p-name { font-size: var(--sm); letter-spacing: 0.02em; line-height: 1; }
.p-arrow {
  position: absolute; top: 12px; right: 12px;
  font-size: 11px; color: var(--text-3); line-height: 1;
  transition: transform .12s, color .12s;
}
.p-btn:hover .p-arrow { transform: translate(2px,-2px); color: var(--text-2); }

.pc-chatgpt    { --pc: var(--chatgpt); }
.pc-claude     { --pc: var(--claude); }
.pc-gemini     { --pc: var(--gemini); }
.pc-copilot    { --pc: var(--copilot); }
.pc-perplexity { --pc: var(--perplexity); }
.pc-lechat     { --pc: var(--lechat); }
.pc-grok       { --pc: var(--grok); }
.pc-deepseek   { --pc: var(--deepseek); }

/* ── Actions row ─────────────────────────────────────────────── */
.actions { display: flex; gap: 8px; }

.btn {
  padding: 14px 20px; background: none;
  border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text-2); font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--sm); letter-spacing: 0.04em;
  cursor: pointer; line-height: 1; white-space: nowrap;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  transition: border-color .12s, color .12s;
}
.btn:hover { border-color: var(--border-2); color: var(--text); }
.btn.flex-1 { flex: 1; }
.btn.copied { border-color: var(--gold-dim); color: var(--gold); }

/* ── Toast ───────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(64px);
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: var(--r); padding: 11px 20px;
  font-size: var(--sm); letter-spacing: 0.02em; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  transition: transform .26s cubic-bezier(.34,1.56,.64,1);
  z-index: 200; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Footer ──────────────────────────────────────────────────── */
footer {
  width: 100%; border-top: 1px solid var(--border);
  display: flex; justify-content: center; margin-top: 8px;
}
.footer-inner {
  width: 100%; max-width: var(--max);
  padding: 36px 28px 48px;
  display: flex; flex-direction: column; gap: 24px;
}
.footer-section { display: flex; flex-direction: column; gap: 12px; }
.footer-heading {
  font-family: 'Fraunces', Georgia, serif;
  font-size: var(--xs); font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-2);
}
.footer-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px 16px;
}
.footer-grid a {
  font-size: var(--xs); color: var(--text-3);
  text-decoration: none; letter-spacing: 0.02em;
  padding: 4px 0; transition: color .12s;
}
.footer-grid a:hover { color: var(--gold); }
.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.footer-links {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.footer-links a {
  font-size: var(--xs); color: var(--text-2);
  text-decoration: none; font-weight: 500;
  letter-spacing: 0.02em; transition: color .12s;
}
.footer-links a:hover { color: var(--gold); }
.footer-copy { font-size: var(--xs); color: var(--text-3); }
.footer-doodle {
  display: block; margin: 4px auto 0; width: 180px; height: auto;
  opacity: .18; transition: opacity .3s;
  filter: invert(1) brightness(1.5);
}
.footer-doodle:hover { opacity: .35; }

@media (prefers-color-scheme: light) {
  .footer-doodle { filter: none; }
}

/* ── Reduced motion ──────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: .01ms !important; }
  .toast { transition: none !important; }
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 580px) {
  .providers { grid-template-columns: repeat(2, 1fr); }
  main.page { gap: 36px; }
  .actions { flex-wrap: wrap; }
  .actions .btn.flex-1 { flex: 0 0 100%; }
}
@media (max-width: 360px) {
  .page, .footer-inner { padding-left: 16px; padding-right: 16px; }
}
</style>

<script>
'use strict';

/* ── Writing prompt library ─────────────────────────────────── */
const DEV_PROMPTS = [
  {
    cat: 'Blog & Articles',
    prompts: [
      { title: 'Write blog post outline', text: "Create a detailed blog post outline on the topic: [topic]\n\nTarget audience: [describe audience]\nTone: [e.g. informative, conversational, authoritative]\nTarget word count: [e.g. 1500 words]\n\nInclude: a compelling title, intro hook, 4–6 main sections with subpoints, and a conclusion with a clear call to action." },
      { title: 'Improve article intro', text: "Rewrite the introduction to this article so it immediately hooks the reader. The current intro:\n\n[paste intro here]\n\nThe article is about: [topic]\nTarget reader: [describe audience]\n\nMake the new intro engaging, specific, and under 100 words. Offer 3 variations." },
      { title: 'Generate blog post ideas', text: "Generate 10 blog post ideas for a [describe blog/brand] targeting [audience].\n\nFocus area: [e.g. productivity, SaaS marketing, personal finance]\n\nFor each idea, include: a working title, the core angle or hook, and who it's most useful for. Prioritize topics that are specific, actionable, and likely to rank well." },
      { title: 'Write a strong conclusion', text: "Write a conclusion for this blog post:\n\nTopic: [topic]\nKey points covered: [summarize main points]\nDesired action after reading: [e.g. subscribe, share, try the product]\n\nThe conclusion should recap the core takeaway, provide a sense of closure, and end with a clear and natural call to action." },
    ]
  },
  {
    cat: 'Social Media',
    prompts: [
      { title: 'Write a tweet thread', text: "Write a Twitter/X thread about: [topic]\n\nAudience: [describe]\nGoal: [e.g. educate, drive traffic, build authority]\nNumber of tweets: [e.g. 8–10]\n\nStart with a strong hook tweet, break the topic into digestible points, and end with a clear CTA. Keep each tweet under 280 characters. Use line breaks for readability." },
      { title: 'Write a LinkedIn post', text: "Write a LinkedIn post about: [topic or experience]\n\nTone: [e.g. thoughtful, direct, story-driven]\nGoal: [e.g. share a lesson, generate comments, build credibility]\n\nStart with a one-line hook that stops the scroll. Use short paragraphs. Include a personal angle or insight. End with a question to encourage comments. Aim for 150–250 words." },
      { title: 'Write an Instagram caption', text: "Write an Instagram caption for a post about: [describe the image/topic]\n\nBrand voice: [e.g. playful, inspiring, minimal]\nGoal: [e.g. increase saves, drive profile visits, sell a product]\n\nInclude: an engaging opening line, 2–3 sentences of supporting copy, a call to action, and 5–10 relevant hashtags." },
      { title: 'Social media content calendar', text: "Create a 2-week social media content calendar for [brand/creator] posting on [platforms, e.g. LinkedIn + Instagram].\n\nNiche: [topic area]\nGoal: [e.g. grow followers, drive traffic, launch a product]\nPosting frequency: [e.g. 3x/week per platform]\n\nFor each post include: the date, platform, content type (e.g. tip, story, promo), and a one-line description of the post idea." },
    ]
  },
  {
    cat: 'Email',
    prompts: [
      { title: 'Write a cold email', text: "Write a cold outreach email for the following situation:\n\nSender: [your name/role/company]\nRecipient: [job title or type of person]\nGoal: [e.g. book a call, get a referral, pitch a partnership]\nContext: [any relevant detail about why you're reaching out]\n\nKeep it under 150 words. Lead with value or relevance — not with who you are. Include a low-friction CTA." },
      { title: 'Write a newsletter intro', text: "Write an intro for this week's email newsletter.\n\nNewsletter name / topic: [describe]\nThis issue is about: [main topic or theme]\nAudience: [describe subscribers]\nTone: [e.g. warm, witty, concise]\n\nThe intro should feel personal, tease the content inside, and make the reader want to keep reading. Keep it under 80 words." },
      { title: 'Write a follow-up email', text: "Write a follow-up email for this situation:\n\nOriginal context: [describe the first interaction — e.g. a sales call, a job interview, a proposal sent]\nTime since last contact: [e.g. 5 days]\nGoal of the follow-up: [e.g. get a decision, re-engage, confirm next steps]\n\nBe warm but direct. Reference the previous conversation briefly. Make it easy to reply. Keep it under 100 words." },
      { title: 'Write a difficult email', text: "Help me write a professional email for a sensitive situation:\n\nSituation: [describe — e.g. apologizing for a missed deadline, declining a request, delivering bad news]\nRecipient: [describe relationship — e.g. client, manager, colleague]\nDesired outcome: [what you want to happen after they read it]\n\nBe honest, take responsibility where appropriate, and keep a constructive tone. Avoid being defensive or over-apologetic." },
    ]
  },
  {
    cat: 'Copywriting',
    prompts: [
      { title: 'Write a product description', text: "Write a compelling product description for:\n\nProduct name: [name]\nWhat it does: [describe]\nKey features: [list 3–5]\nTarget customer: [describe]\nTone: [e.g. premium, playful, technical]\n\nFocus on benefits over features. Lead with the biggest value. Keep it under 120 words and end with a natural nudge toward purchase." },
      { title: 'Landing page headline + subhead', text: "Write 5 headline and subheadline combinations for a landing page.\n\nProduct/service: [describe]\nTarget audience: [describe]\nCore value proposition: [what problem does it solve or what outcome does it deliver]\nTone: [e.g. bold, reassuring, witty]\n\nEach headline should be clear, specific, and benefit-driven. The subheadline should expand on it and handle an objection or add credibility." },
      { title: 'Write call to action variations', text: "Write 10 call-to-action (CTA) button copy variations for:\n\nProduct/service: [describe]\nGoal of the CTA: [e.g. start a free trial, book a demo, download a guide]\nTone: [e.g. action-oriented, low-pressure, curious]\n\nVary the angle — try urgency, benefit-first, curiosity, and social proof framings. Keep each option under 6 words where possible." },
      { title: 'Brand voice rewrite', text: "Rewrite the following copy to match our brand voice.\n\nOriginal copy:\n[paste copy here]\n\nOur brand voice is: [describe — e.g. confident but approachable, expert but never jargon-heavy, warm and witty]\nAudience: [describe]\n\nKeep the core message intact but adjust the tone, word choice, and sentence structure to fit the voice. Show before and after." },
    ]
  },
  {
    cat: 'Editing',
    prompts: [
      { title: 'Simplify complex text', text: "Simplify the following text so it's easy to understand for a general audience with no background knowledge on the topic.\n\n[paste text here]\n\nAvoid jargon. Use short sentences. Replace technical terms with plain language. Preserve the original meaning and all key information. Target a reading level of grade 8." },
      { title: 'Fix tone and style', text: "Edit the following text to improve its tone and style.\n\nCurrent text:\n[paste text here]\n\nThe tone should be: [e.g. more confident, less formal, warmer, more concise]\nKeep the meaning and facts intact. Show the revised version and briefly explain the main changes you made." },
      { title: 'Shorten to word count', text: "Shorten the following text to approximately [target word count] words without losing the key message or changing the meaning.\n\n[paste text here]\n\nPrioritize cutting: filler phrases, redundant sentences, and over-explanation. Keep the most important points, the clearest examples, and the strongest language." },
      { title: 'Proofread and improve', text: "Proofread the following text and suggest improvements.\n\n[paste text here]\n\nCheck for: spelling and grammar errors, awkward phrasing, unclear sentences, and inconsistent tone. Present the corrected version followed by a brief list of the changes made and why." },
    ]
  },
  {
    cat: 'Creative',
    prompts: [
      { title: 'Write a short story opening', text: "Write the opening 3 paragraphs of a short story with the following details:\n\nGenre: [e.g. literary fiction, sci-fi, thriller]\nSetting: [describe time and place]\nMain character: [brief description]\nOpening situation or conflict: [describe]\nMood/tone: [e.g. tense, melancholic, hopeful]\n\nStart in the middle of the action or a vivid moment. Hook the reader immediately. Avoid preamble." },
      { title: 'Generate character dialogue', text: "Write a dialogue scene between two characters:\n\nCharacter A: [name, brief description, their goal in this scene]\nCharacter B: [name, brief description, their goal in this scene]\nSituation: [describe what's happening and where]\nUnderlying tension: [what's really at stake or unsaid]\n\nMake the dialogue feel natural and revealing. Each character should have a distinct voice. Show subtext — what they mean vs. what they say." },
      { title: 'Create metaphors and analogies', text: "Generate 8 original metaphors or analogies to explain the following concept:\n\nConcept: [describe the idea, process, or thing]\nAudience: [who needs to understand it]\nContext: [where it will be used — e.g. a blog post, a speech, a product explainer]\n\nAim for a mix of styles: some visual, some emotional, some humorous. Avoid cliches. For each, add a one-sentence note on when it works best." },
      { title: 'Rewrite in a different style', text: "Rewrite the following text in the style of [author name or style description, e.g. Ernest Hemingway, a Victorian novelist, a Gen Z social media post].\n\nOriginal text:\n[paste text here]\n\nCapture the voice, sentence rhythm, vocabulary, and structural patterns of that style. Keep the core content and meaning. Show only the rewritten version." },
    ]
  },
];

/* ── State ───────────────────────────────────────────────────── */
let activeCat = 'All';
let selectedCard = null;

/* ── DOM refs ────────────────────────────────────────────────── */
const catsEl       = document.getElementById('cats');
const cardsEl      = document.getElementById('prompt-cards');
const promptEl     = document.getElementById('prompt');
const providersEl  = document.getElementById('providers');
const charCountEl  = document.getElementById('charCount');
const copyBtn      = document.getElementById('copyBtn');
const clearBtnEl   = document.getElementById('clearBtn');
const toastEl      = document.getElementById('toast');

/* ── Render categories ──────────────────────────────────────── */
function renderCats() {
  const cats = ['All', ...DEV_PROMPTS.map(c => c.cat)];
  catsEl.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat' + (activeCat === cat ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCat = cat;
      selectedCard = null;
      renderCats();
      renderCards();
    });
    catsEl.appendChild(btn);
  });
}

/* ── Render prompt cards ────────────────────────────────────── */
function renderCards() {
  cardsEl.innerHTML = '';
  const groups = activeCat === 'All' ? DEV_PROMPTS : DEV_PROMPTS.filter(c => c.cat === activeCat);

  groups.forEach(group => {
    if (activeCat === 'All') {
      const catLabel = document.createElement('span');
      catLabel.className = 'lbl';
      catLabel.textContent = group.cat;
      catLabel.style.marginTop = cardsEl.children.length ? '20px' : '0';
      cardsEl.appendChild(catLabel);
    }

    group.prompts.forEach(p => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      card.innerHTML = `<div class="prompt-card-title">${p.title}</div><div class="prompt-card-preview">${escHtml(p.text)}</div>`;
      card.addEventListener('click', () => {
        const wasSelected = selectedCard === p;
        document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));

        if (wasSelected) {
          selectedCard = null;
          promptEl.value = '';
        } else {
          selectedCard = p;
          card.classList.add('selected');
          promptEl.value = p.text;
          promptEl.focus();
        }
        updateCount();
      });
      cardsEl.appendChild(card);
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Providers ──────────────────────────────────────────────── */
const enc = s => encodeURIComponent(s);
const providers = [
  { id: 'chatgpt',    label: 'ChatGPT',    cls: 'pc-chatgpt',    url: q => `https://chatgpt.com/?q=${enc(q)}` },
  { id: 'claude',     label: 'Claude',     cls: 'pc-claude',     url: q => `https://claude.ai/new?q=${enc(q)}` },
  { id: 'gemini',     label: 'Gemini',     cls: 'pc-gemini',     url: q => `https://gemini.google.com/app?q=${enc(q)}` },
  { id: 'copilot',    label: 'Copilot',    cls: 'pc-copilot',    url: q => `https://copilot.microsoft.com/?q=${enc(q)}` },
  { id: 'perplexity', label: 'Perplexity', cls: 'pc-perplexity', url: q => `https://www.perplexity.ai/search?q=${enc(q)}` },
  { id: 'lechat',     label: 'Le Chat',    cls: 'pc-lechat',     url: q => `https://chat.mistral.ai/chat?q=${enc(q)}` },
  { id: 'grok',       label: 'Grok',       cls: 'pc-grok',       url: q => `https://x.com/i/grok?text=${enc(q)}` },
  { id: 'deepseek',   label: 'DeepSeek',   cls: 'pc-deepseek',   url: q => `https://chat.deepseek.com/?q=${enc(q)}` },
];

providers.forEach(p => {
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.type = 'button'; btn.className = `p-btn ${p.cls}`;
  btn.setAttribute('aria-label', `Open in ${p.label}`);
  btn.innerHTML = `<span class="p-dot" aria-hidden="true"></span><span class="p-name">${p.label}</span><span class="p-arrow" aria-hidden="true">&nearr;</span>`;
  btn.addEventListener('click', () => openProvider(p));
  li.appendChild(btn); providersEl.appendChild(li);
});

/* ── Core actions ────────────────────────────────────────────── */
function getPrompt() { return promptEl.value.trim(); }

function openProvider(p) {
  const q = getPrompt();
  if (!q) { showToast('Write a prompt first'); return; }
  const w = window.open(p.url(q), '_blank', 'noopener,noreferrer');
  if (!w) showToast('Popup blocked — copy & paste instead');
}

function updateCount() {
  const n = promptEl.value.length;
  charCountEl.textContent = n > 0 ? n.toLocaleString() : '';
  charCountEl.classList.toggle('warn', n > 3000);
}

promptEl.addEventListener('input', () => {
  updateCount();
  if (!promptEl.value) {
    selectedCard = null;
    document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));
  }
});

copyBtn.addEventListener('click', async () => {
  const q = getPrompt();
  if (!q) { showToast('Nothing to copy yet'); return; }
  try {
    await navigator.clipboard.writeText(q);
    copyBtn.textContent = '\u2713 Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'Copy to clipboard';
      copyBtn.classList.remove('copied');
    }, 2200);
  } catch { showToast('Copy failed — try manually'); }
});

clearBtnEl.addEventListener('click', () => {
  promptEl.value = ''; updateCount();
  selectedCard = null;
  document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));
  promptEl.focus();
});

/* ── Keyboard shortcuts ──────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.activeElement === promptEl) {
    clearBtnEl.click(); return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'c' && document.activeElement === promptEl && !window.getSelection()?.toString()) {
    e.preventDefault(); copyBtn.click();
  }
});

/* ── Toast ───────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

/* ── Init ────────────────────────────────────────────────────── */
renderCats();
renderCards();

/* ── Service Worker ──────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
