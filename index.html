<style>
/* ── Tokens ──────────────────────────────────────────────────── */
:root {
  --bg:        #0f0f10;
  --surface:   #1a1a1c;
  --surface-2: #222225;
  --border:    #2c2c30;
  --border-2:  #404046;
  --text:      #f0ece4;
  --text-2:    #9e9a96;
  --text-3:    #5a5856;
  --gold:      #d4a847;
  --gold-dim:  #9a7830;
  --gold-glow: rgba(212,168,71,.1);
  --focus:     #d4a847;
  --red-soft:  rgba(176,70,70,.08);
  --red:       #b04646;

  --chatgpt:    #10a37f;
  --claude:     #c8845a;
  --gemini:     #4285f4;
  --copilot:    #7b6fcc;
  --perplexity: #17b0a7;
  --lechat:     #f06830;
  --grok:       #aaaaaa;
  --deepseek:   #4d6bfe;

  /* ↑ bumped all sizes up ~1.5 steps */
  --xs:   0.8125rem;   /* 13px — was 11px */
  --sm:   0.9375rem;   /* 15px — was 13px */
  --base: 1.0625rem;   /* 17px — was 15px */
  --lg:   1.125rem;    /* 18px */
  --2xl:  2.375rem;    /* 38px — was 34px */

  --r:    8px;
  --r-lg: 12px;
  --max:  700px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:        #f4f0e8;
    --surface:   #fdfaf5;
    --surface-2: #f0ece2;
    --border:    #e0dbd0;
    --border-2:  #c8c2b4;
    --text:      #1a1714;
    --text-2:    #5a554e;
    --text-3:    #9c968e;
    --gold:      #7a5518;
    --gold-dim:  #9a6c28;
    --gold-glow: rgba(122,85,24,.07);
    --focus:     #7a5518;
    --red:       #903030;
    --red-soft:  rgba(144,48,48,.07);
  }
}

/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--base);
  line-height: 1.65;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Skip link ───────────────────────────────────────────────── */
.skip {
  position: absolute; top: -100%; left: 16px;
  background: var(--gold); color: var(--bg);
  font-size: var(--sm); padding: 8px 16px;
  border-radius: 0 0 var(--r) var(--r);
  text-decoration: none; z-index: 999; transition: top .15s;
}
.skip:focus { top: 0; outline: none; }

/* ── Focus ───────────────────────────────────────────────────── */
:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: var(--r); }
:focus:not(:focus-visible) { outline: none; }

/* ── Page shell ──────────────────────────────────────────────── */
.page { width: 100%; max-width: var(--max); padding: 0 28px; }

/* ── Header ──────────────────────────────────────────────────── */
header.page { padding-top: 60px; padding-bottom: 52px; }

h1.logo {
  display: flex; align-items: baseline; gap: 8px;
  font-size: inherit; font-weight: inherit; margin-bottom: 12px;
}
.logo-a {
  font-family: 'Fraunces', Georgia, serif;
  font-optical-sizing: auto; font-weight: 600;
  font-size: var(--2xl); letter-spacing: -0.03em;
  line-height: 1; color: var(--text);
}
.logo-b {
  font-family: 'Fraunces', Georgia, serif;
  font-optical-sizing: auto; font-weight: 200; font-style: italic;
  font-size: var(--2xl); letter-spacing: -0.02em;
  line-height: 1; color: var(--gold);
}
.tagline {
  font-size: var(--sm); color: var(--text-3);
  letter-spacing: 0.01em; line-height: 1;
}

/* ── Main ────────────────────────────────────────────────────── */
main.page { padding-bottom: 86px; display: flex; flex-direction: column; gap: 40px; }

/* ── Section labels ──────────────────────────────────────────── */
.lbl {
  display: block;
  font-size: var(--xs); letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--text-3);
  font-weight: 500; margin-bottom: 12px;
}

/* ── Template chips ──────────────────────────────────────────── */
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  padding: 7px 14px; background: none;
  border: 1px solid var(--border); border-radius: 100px;
  color: var(--text-2); font-family: 'DM Mono', monospace;
  font-size: var(--xs); letter-spacing: 0.03em; line-height: 1;
  cursor: pointer; user-select: none;
  transition: color .12s, border-color .12s, background .12s;
}
.chip:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-glow); }
.chip[aria-pressed="true"] { color: var(--gold); border-color: var(--gold); background: var(--gold-glow); }

/* ── Chip groups (pill container for text + pin [+ del]) ─────── */
.chip-group {
  display: inline-flex; align-items: stretch;
  border: 1px solid var(--border); border-radius: 100px;
  overflow: hidden;
  transition: border-color .12s, background .12s;
}
.chip-group.chip-hidden { display: none; }
.chip-group:hover { border-color: var(--border-2); }
.chip-group:has(> .chip:hover) { border-color: var(--gold-dim); background: var(--gold-glow); }
.chip-group:has(.chip[aria-pressed="true"]) { border-color: var(--gold); background: var(--gold-glow); }

/* strip chip's own pill when inside a group */
.chip-group > .chip {
  border: none; border-radius: 0;
  padding: 7px 8px 7px 14px;
}
.chip-group > .chip:hover { background: none; border-color: transparent; }

/* pin button inside pill */
.chip-pin-btn {
  background: none; border: none;
  border-left: 1px solid transparent;
  cursor: pointer; padding: 0 10px;
  font-size: 12px; color: var(--text-3);
  opacity: 0; display: flex; align-items: center;
  transition: opacity .14s, color .14s, background .14s, border-left-color .14s;
}
.chip-group:hover .chip-pin-btn { opacity: 1; border-left-color: var(--border); }
.chip-pin-btn:hover { color: var(--gold); background: var(--gold-glow); }
.chip-pin-btn.active { opacity: 1; color: var(--gold); border-left-color: var(--border); }

.chip.chip-show-more { border-style: dashed; color: var(--text-3); }
.chip.chip-show-more:hover { color: var(--text-2); border-color: var(--border-2); background: none; }

/* delete button inside pill (library only) */
.chip-del-btn {
  background: none; border: none;
  border-left: 1px solid transparent;
  cursor: pointer; padding: 0 10px;
  font-size: 12px; color: var(--text-3);
  opacity: 0; display: flex; align-items: center;
  transition: opacity .14s, color .14s, background .14s, border-left-color .14s;
}
.chip-group:hover .chip-del-btn { opacity: 1; border-left-color: var(--border); }
.chip-del-btn:hover { color: var(--red); background: var(--red-soft); }

/* ── Textarea ────────────────────────────────────────────────── */
.prompt-wrap { position: relative; }
textarea {
  display: block; width: 100%; min-height: 210px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: var(--base);
  line-height: 1.75; padding: 20px 20px 50px;
  resize: vertical; outline: none; caret-color: var(--gold);
  transition: border-color .18s, box-shadow .18s;
}
textarea::placeholder { color: var(--text-3); font-style: italic; }
textarea:hover { border-color: var(--border-2); }
textarea:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }

.prompt-meta {
  position: absolute; bottom: 15px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.char-count {
  font-size: var(--xs); color: var(--text-3);
  font-variant-numeric: tabular-nums; transition: color .2s;
}
.char-count.warn { color: #c97a40; }
.shortcut { font-size: var(--xs); color: var(--text-3); }
.shortcut kbd {
  font-family: 'DM Mono', monospace; font-size: 0.7rem;
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: 3px; padding: 1px 5px; color: var(--text-2);
}

/* ── Provider cards ──────────────────────────────────────────── */
.providers {
  list-style: none;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.p-btn {
  width: 100%; display: flex; flex-direction: column;
  align-items: flex-start; gap: 10px; padding: 14px 14px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); color: var(--text);
  font-family: 'DM Mono', monospace; cursor: pointer;
  transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;
  text-align: left; position: relative; overflow: hidden;
}
.p-btn:hover {
  background: var(--surface-2); border-color: var(--border-2);
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.18);
}
.p-btn:active { transform: translateY(0); box-shadow: none; }
.p-dot {
  width: 28px; height: 4px; border-radius: 2px;
  background: var(--pc, var(--border)); opacity: .65;
  transition: opacity .12s, width .12s;
}
.p-btn:hover .p-dot { opacity: 1; width: 36px; }
.p-name { font-size: var(--sm); letter-spacing: 0.02em; line-height: 1; }
.p-arrow {
  position: absolute; top: 12px; right: 12px;
  font-size: 11px; color: var(--text-3); line-height: 1;
  transition: transform .12s, color .12s;
}
.p-btn:hover .p-arrow { transform: translate(2px,-2px); color: var(--text-2); }

.pc-chatgpt    { --pc: var(--chatgpt); }
.pc-claude     { --pc: var(--claude); }
.pc-gemini     { --pc: var(--gemini); }
.pc-copilot    { --pc: var(--copilot); }
.pc-perplexity { --pc: var(--perplexity); }
.pc-lechat     { --pc: var(--lechat); }
.pc-grok       { --pc: var(--grok); }
.pc-deepseek   { --pc: var(--deepseek); }

/* ── Actions row ─────────────────────────────────────────────── */
.actions { display: flex; gap: 8px; }

.btn {
  padding: 14px 20px; background: none;
  border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text-2); font-family: 'DM Mono', monospace;
  font-size: var(--sm); letter-spacing: 0.04em;
  cursor: pointer; line-height: 1; white-space: nowrap;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  transition: border-color .12s, color .12s;
}
.btn:hover { border-color: var(--border-2); color: var(--text); }
.btn.flex-1 { flex: 1; }
.btn.copied { border-color: var(--gold-dim); color: var(--gold); }
.btn.saved-flash { border-color: var(--gold-dim); color: var(--gold); }

.btn-kbd {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: 3px; padding: 2px 5px;
  color: var(--text-3); letter-spacing: 0;
  line-height: 1; display: inline-block;
  transition: color .12s, border-color .12s;
}
.btn:hover .btn-kbd { color: var(--text-2); border-color: var(--border-2); }

/* ── Toast ───────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(64px);
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: var(--r); padding: 11px 20px;
  font-size: var(--sm); letter-spacing: 0.02em; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  transition: transform .26s cubic-bezier(.34,1.56,.64,1);
  z-index: 200; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Footer ──────────────────────────────────────────────────── */
footer {
  width: 100%; border-top: 1px solid var(--border);
  display: flex; justify-content: center; margin-top: 8px;
}
.footer-inner {
  width: 100%; max-width: var(--max);
  padding: 32px 28px 48px;
  display: flex; flex-direction: column; gap: 8px;
}
.footer-desc { font-size: var(--xs); color: var(--text-3); line-height: 2; }
.footer-desc strong { color: var(--text-2); font-weight: 500; }
.footer-desc a {
  color: var(--text-2); text-decoration: underline;
  text-underline-offset: 3px; text-decoration-color: var(--border-2);
  transition: color .12s;
}
.footer-desc a:hover { color: var(--gold); }
.footer-copy { font-size: var(--xs); color: var(--text-3); }

/* ── Noscript ────────────────────────────────────────────────── */
.noscript {
  width: 100%; background: #6b2d10; color: #faf7f2;
  text-align: center; font-size: var(--sm); padding: 10px 16px;
}

/* ── Reduced motion ──────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: .01ms !important; }
  .toast { transition: none !important; }
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 580px) {
  .providers { grid-template-columns: repeat(2, 1fr); }
  .logo-a, .logo-b { font-size: 2rem; }
  header.page { padding-top: 44px; padding-bottom: 36px; }
  main.page { gap: 36px; }
  .shortcut { display: none; }
  .actions { flex-wrap: wrap; }
  .actions #copyBtn { flex: 0 0 100%; }
  .actions #saveBtn, .actions #clearBtn { flex: 1; }
}
@media (max-width: 360px) {
  .page, .footer-inner { padding-left: 16px; padding-right: 16px; }
}
</style>

/* ── Language & locale ───────────────────────────────────────── */
const lang   = window.__LANG__ || 'en';
const locale = LOCALES[lang] || LOCALES.en;
const templates = locale.templates;

const enc = s => encodeURIComponent(s);

const providers = [
  { id: 'chatgpt',    label: 'ChatGPT',    cls: 'pc-chatgpt',    url: q => `https://chatgpt.com/?q=${enc(q)}` },
  { id: 'claude',     label: 'Claude',     cls: 'pc-claude',     url: q => `https://claude.ai/new?q=${enc(q)}` },
  { id: 'gemini',     label: 'Gemini',     cls: 'pc-gemini',     url: q => `https://gemini.google.com/app?q=${enc(q)}` },
  { id: 'copilot',    label: 'Copilot',    cls: 'pc-copilot',    url: q => `https://copilot.microsoft.com/?q=${enc(q)}` },
  { id: 'perplexity', label: 'Perplexity', cls: 'pc-perplexity', url: q => `https://www.perplexity.ai/search?q=${enc(q)}` },
  { id: 'lechat',     label: 'Le Chat',    cls: 'pc-lechat',     url: q => `https://chat.mistral.ai/chat?q=${enc(q)}` },
  { id: 'grok',       label: 'Grok',       cls: 'pc-grok',       url: q => `https://x.com/i/grok?text=${enc(q)}` },
  { id: 'deepseek',   label: 'DeepSeek',   cls: 'pc-deepseek',   url: q => `https://chat.deepseek.com/?q=${enc(q)}` },
];

/* ── DOM refs ────────────────────────────────────────────────── */
const promptEl    = document.getElementById('prompt');
const chipsEl     = document.getElementById('chips');
const providersEl = document.getElementById('providers');
const charCountEl = document.getElementById('charCount');
const copyBtn     = document.getElementById('copyBtn');
const saveBtn     = document.getElementById('saveBtn');
const clearBtnEl  = document.getElementById('clearBtn');
const toastEl     = document.getElementById('toast');
const libSection  = document.getElementById('lib-section');
const libList     = document.getElementById('lib-list');

/* ── Apply locale to meta & static UI ───────────────────────── */
function applyLocale() {
  document.title = locale.title;
  document.querySelector('meta[name="description"]').setAttribute('content', locale.metaDesc);
  document.querySelector('meta[property="og:locale"]').setAttribute('content', locale.ogLocale);
  document.querySelector('meta[property="og:image:alt"]').setAttribute('content', locale.ogImageAlt);
  document.querySelector('meta[property="og:title"]').setAttribute('content', locale.title);
  document.querySelector('meta[property="og:description"]').setAttribute('content', locale.metaDesc);
  document.querySelector('meta[name="twitter:title"]').setAttribute('content', locale.title);
  document.querySelector('meta[name="twitter:description"]').setAttribute('content', locale.metaDesc);
  document.getElementById('tagline').textContent = locale.tagline;
  document.getElementById('lbl-templates').textContent = locale.lblTemplates;
  document.getElementById('lbl-library').textContent = locale.lblLibrary;
  document.getElementById('lbl-prompt').textContent = locale.lblPrompt;
  document.getElementById('lbl-providers').textContent = locale.lblProviders;
  promptEl.setAttribute('placeholder', locale.placeholder);
  copyBtn.textContent = locale.copyBtn;
  copyBtn.setAttribute('aria-label', locale.copyBtn);
  saveBtn.textContent = locale.saveBtn;
  saveBtn.setAttribute('aria-label', locale.saveBtn);
  clearBtnEl.textContent = locale.clearBtn;
  clearBtnEl.setAttribute('aria-label', locale.clearBtn);
  document.getElementById('footer-copy').textContent = locale.footerCopy.replace('{year}', new Date().getFullYear());
  // Shortcut hint (aria-hidden, decorative)
  document.getElementById('shortcut-hint').innerHTML =
    `<kbd>⌘S</kbd> ${locale.saveBtn.toLowerCase()}\u00a0\u00a0 <kbd>⌘C</kbd> ${locale.shortcutCopy}\u00a0\u00a0 <kbd>Esc</kbd> ${locale.clearBtn.toLowerCase()}`;
  // Footer body paragraph
  document.getElementById('footer-desc').innerHTML =
    `<strong>Prompt Router</strong> ${locale.footerDescIntro} ${FOOTER_LINKS}. ${locale.footerDescOutro}`;
}

const FOOTER_LINKS =
  `<a href="https://chatgpt.com" rel="noopener noreferrer" target="_blank">ChatGPT</a>, ` +
  `<a href="https://claude.ai" rel="noopener noreferrer" target="_blank">Claude</a>, ` +
  `<a href="https://gemini.google.com" rel="noopener noreferrer" target="_blank">Gemini</a>, ` +
  `<a href="https://copilot.microsoft.com" rel="noopener noreferrer" target="_blank">Copilot</a>, ` +
  `<a href="https://www.perplexity.ai" rel="noopener noreferrer" target="_blank">Perplexity</a>, ` +
  `<a href="https://chat.deepseek.com" rel="noopener noreferrer" target="_blank">DeepSeek</a>, ` +
  `<a href="https://x.com/i/grok" rel="noopener noreferrer" target="_blank">Grok</a>, and ` +
  `<a href="https://chat.mistral.ai" rel="noopener noreferrer" target="_blank">Le Chat</a>`;
applyLocale();

/* ── State ───────────────────────────────────────────────────── */
const TPL_PIN_KEY   = 'pr_pinned_tpls';
const CHIPS_VISIBLE = 3;
const LIB_VISIBLE   = 3;
const TITLE_MAX     = 30;
let activeTplLabel  = null;
let tplExpanded     = false;
let libExpanded     = false;

function getPinnedTpls() {
  try { return JSON.parse(localStorage.getItem(TPL_PIN_KEY)) || []; }
  catch { return []; }
}

/* ── Render template chips ───────────────────────────────────── */
function renderChips() {
  const pinned = getPinnedTpls();
  const sorted = [...templates].sort((a, b) =>
    (pinned.includes(b.label) ? 1 : 0) - (pinned.includes(a.label) ? 1 : 0)
  );
  chipsEl.innerHTML = '';

  sorted.forEach((tpl, i) => {
    const isPinned = pinned.includes(tpl.label);
    const isHidden = !tplExpanded && i >= CHIPS_VISIBLE;

    const group = document.createElement('div');
    group.className = 'chip-group' + (isHidden ? ' chip-hidden' : '');

    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'chip';
    btn.textContent = tpl.label;
    btn.setAttribute('aria-pressed', activeTplLabel === tpl.label ? 'true' : 'false');
    btn.addEventListener('click', () => {
      const active = btn.getAttribute('aria-pressed') === 'true';
      chipsEl.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
      promptEl.value = active ? '' : tpl.text;
      activeTplLabel = active ? null : tpl.label;
      if (!active) { btn.setAttribute('aria-pressed', 'true'); promptEl.focus(); }
      updateCount();
    });

    const pinBtn = document.createElement('button');
    pinBtn.type = 'button';
    pinBtn.className = 'chip-pin-btn' + (isPinned ? ' active' : '');
    pinBtn.title = isPinned ? locale.unpinTitle : locale.pinTitle;
    pinBtn.setAttribute('aria-label', isPinned
      ? locale.ariaUnpinTpl.replace('{label}', tpl.label)
      : locale.ariaPinTpl.replace('{label}', tpl.label));
    pinBtn.textContent = isPinned ? '★' : '☆';
    pinBtn.addEventListener('click', () => {
      const p = getPinnedTpls();
      const idx = p.indexOf(tpl.label);
      if (idx >= 0) p.splice(idx, 1); else p.push(tpl.label);
      localStorage.setItem(TPL_PIN_KEY, JSON.stringify(p));
      renderChips();
    });

    group.appendChild(btn);
    group.appendChild(pinBtn);
    chipsEl.appendChild(group);
  });

  if (templates.length > CHIPS_VISIBLE) {
    const moreBtn = document.createElement('button');
    moreBtn.type = 'button';
    moreBtn.className = 'chip chip-show-more';
    moreBtn.textContent = tplExpanded ? locale.showLess : locale.showMore.replace('{n}', templates.length - CHIPS_VISIBLE);
    moreBtn.addEventListener('click', () => { tplExpanded = !tplExpanded; renderChips(); });
    chipsEl.appendChild(moreBtn);
  }
}
renderChips();

/* ── Render providers ────────────────────────────────────────── */
providers.forEach(p => {
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.type = 'button'; btn.className = `p-btn ${p.cls}`;
  btn.setAttribute('aria-label', `${locale.lblProviders} ${p.label}`);
  btn.innerHTML = `<span class="p-dot" aria-hidden="true"></span><span class="p-name">${p.label}</span><span class="p-arrow" aria-hidden="true">↗</span>`;
  btn.addEventListener('click', () => openProvider(p));
  li.appendChild(btn); providersEl.appendChild(li);
});

/* ── Core actions ────────────────────────────────────────────── */
function getPrompt() { return promptEl.value.trim(); }

function openProvider(p) {
  const q = getPrompt();
  if (!q) { showToast(locale.toastNoPrompt); return; }
  const w = window.open(p.url(q), '_blank', 'noopener,noreferrer');
  if (!w) showToast(locale.toastPopup);
}

function updateCount() {
  const n = promptEl.value.length;
  charCountEl.textContent = n > 0 ? n.toLocaleString() : '';
  charCountEl.classList.toggle('warn', n > 3000);
}

promptEl.addEventListener('input', () => {
  updateCount();
  if (!promptEl.value) {
    activeTplLabel = null;
    chipsEl.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
  }
});

async function copyPrompt() {
  const q = getPrompt();
  if (!q) { showToast(locale.toastNoCopy); return; }
  try {
    await navigator.clipboard.writeText(q);
    copyBtn.textContent = locale.copyBtnDone;
    copyBtn.setAttribute('aria-label', locale.copyBtnDone);
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = locale.copyBtn;
      copyBtn.setAttribute('aria-label', locale.copyBtn);
      copyBtn.classList.remove('copied');
    }, 2200);
  } catch { showToast(locale.toastCopyFail); }
}

function clearPrompt() {
  promptEl.value = ''; updateCount();
  activeTplLabel = null;
  chipsEl.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
  promptEl.focus();
}

/* ── Keyboard shortcuts ──────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const inTextarea = document.activeElement === promptEl;

  if (e.key === 'Escape' && inTextarea) {
    clearPrompt(); return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault(); savePrompt(); return;
  }
  // ⌘C / Ctrl+C copies the prompt only when textarea is focused
  // (browser default copy still works when text is selected)
  if ((e.metaKey || e.ctrlKey) && e.key === 'c' && inTextarea && !window.getSelection()?.toString()) {
    e.preventDefault(); copyPrompt();
  }
});

/* ── Toast ───────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

/* ── Library persistence ─────────────────────────────────────── */
const LIB_KEY  = 'pr_library';
const LIB_MAX  = 10;

function readLib() {
  try { return JSON.parse(localStorage.getItem(LIB_KEY)) || []; }
  catch { return []; }
}
function writeLib(lib) { localStorage.setItem(LIB_KEY, JSON.stringify(lib)); }

/* ── Render library ──────────────────────────────────────────── */
function renderLib() {
  const lib = readLib();
  lib.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || b.ts - a.ts);

  libSection.style.display = lib.length ? '' : 'none';
  libList.innerHTML = '';

  lib.forEach((item, i) => {
    const displayTitle = item.title.length > TITLE_MAX
      ? item.title.slice(0, TITLE_MAX).trimEnd() + '…'
      : item.title;

    const isHidden = !libExpanded && i >= LIB_VISIBLE;
    const group = document.createElement('div');
    group.className = 'chip-group' + (isHidden ? ' chip-hidden' : '');

    const loadBtn = document.createElement('button');
    loadBtn.type = 'button'; loadBtn.className = 'chip';
    loadBtn.textContent = displayTitle;
    loadBtn.title = item.text;
    loadBtn.setAttribute('aria-label', locale.ariaLoad.replace('{title}', item.title));
    loadBtn.addEventListener('click', () => {
      promptEl.value = item.text; updateCount();
      chipsEl.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
      libList.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
      activeTplLabel = null;
      loadBtn.setAttribute('aria-pressed', 'true');
      promptEl.focus();
    });

    const pinBtn = document.createElement('button');
    pinBtn.type = 'button';
    pinBtn.className = 'chip-pin-btn' + (item.pinned ? ' active' : '');
    pinBtn.textContent = item.pinned ? '★' : '☆';
    pinBtn.title = item.pinned ? locale.unpinTitle : locale.pinTitle;
    pinBtn.setAttribute('aria-label', item.pinned
      ? locale.ariaUnpin.replace('{title}', item.title)
      : locale.ariaPin.replace('{title}', item.title));
    pinBtn.addEventListener('click', () => {
      const lib2 = readLib();
      const f = lib2.find(x => x.ts === item.ts);
      if (f) f.pinned = !f.pinned;
      writeLib(lib2); renderLib();
    });

    const delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'chip-del-btn';
    delBtn.textContent = '×';
    delBtn.title = locale.deleteTitle;
    delBtn.setAttribute('aria-label', locale.ariaDelete.replace('{title}', item.title));
    delBtn.addEventListener('click', () => {
      writeLib(readLib().filter(x => x.ts !== item.ts));
      renderLib();
    });

    group.appendChild(loadBtn);
    group.appendChild(pinBtn);
    group.appendChild(delBtn);
    libList.appendChild(group);
  });

  if (lib.length > LIB_VISIBLE) {
    const moreBtn = document.createElement('button');
    moreBtn.type = 'button';
    moreBtn.className = 'chip chip-show-more';
    moreBtn.textContent = libExpanded ? locale.showLess : locale.showMore.replace('{n}', lib.length - LIB_VISIBLE);
    moreBtn.addEventListener('click', () => { libExpanded = !libExpanded; renderLib(); });
    libList.appendChild(moreBtn);
  }
}

/* ── Save prompt ─────────────────────────────────────────────── */
function savePrompt() {
  const text = getPrompt();
  if (!text) { showToast(locale.toastNoSave); return; }
  const lib = readLib();
  if (lib.length >= LIB_MAX) { showToast(locale.toastLibFull); return; }
  if (lib.some(x => x.text === text)) { showToast(locale.toastDuplicate); return; }

  const title = text.replace(/\s+/g, ' ').trim().slice(0, 50) + (text.length > 50 ? '…' : '');
  lib.push({ title, text, ts: Date.now(), pinned: false });
  writeLib(lib); renderLib();

  saveBtn.textContent = locale.toastSaved;
  saveBtn.classList.add('saved-flash');
  setTimeout(() => {
    saveBtn.textContent = locale.saveBtn;
    saveBtn.classList.remove('saved-flash');
  }, 2000);
}

/* ── Init ────────────────────────────────────────────────────── */
renderLib();
</script>
