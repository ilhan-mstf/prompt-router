<style>
/* ── Tokens ──────────────────────────────────────────────────── */
:root {
  --bg:        #0f0f10;
  --surface:   #1a1a1c;
  --surface-2: #222225;
  --border:    #2c2c30;
  --border-2:  #404046;
  --text:      #f0ece4;
  --text-2:    #c5c0b9;
  --text-3:    #8a8580;
  --gold:      #d4a847;
  --gold-dim:  #9a7830;
  --gold-glow: rgba(212,168,71,.1);
  --focus:     #d4a847;

  --chatgpt:    #10a37f;
  --claude:     #c8845a;
  --gemini:     #4285f4;
  --copilot:    #7b6fcc;
  --perplexity: #17b0a7;
  --lechat:     #f06830;
  --grok:       #aaaaaa;
  --deepseek:   #4d6bfe;

  --xs:   0.9rem;
  --sm:   1.05rem;
  --base: 1.1875rem;
  --lg:   1.25rem;
  --2xl:  2.625rem;

  --r:    8px;
  --r-lg: 12px;
  --max:  700px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:        #f4f0e8;
    --surface:   #fdfaf5;
    --surface-2: #f0ece2;
    --border:    #e0dbd0;
    --border-2:  #c8c2b4;
    --text:      #1a1714;
    --text-2:    #3d3832;
    --text-3:    #736d65;
    --gold:      #7a5518;
    --gold-dim:  #9a6c28;
    --gold-glow: rgba(122,85,24,.07);
    --focus:     #7a5518;
  }
}

/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--base);
  line-height: 1.65;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Skip link ───────────────────────────────────────────────── */
.skip {
  position: absolute; top: -100%; left: 16px;
  background: var(--gold); color: var(--bg);
  font-size: var(--sm); padding: 8px 16px;
  border-radius: 0 0 var(--r) var(--r);
  text-decoration: none; z-index: 999; transition: top .15s;
}
.skip:focus { top: 0; outline: none; }

/* ── Focus ───────────────────────────────────────────────────── */
:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: var(--r); }
:focus:not(:focus-visible) { outline: none; }

/* ── Page shell ──────────────────────────────────────────────── */
.page { width: 100%; max-width: var(--max); padding: 0 28px; }

/* ── Top bar ─────────────────────────────────────────────────── */
.topbar {
  width: 100%; background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: center;
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  background: color-mix(in srgb, var(--surface) 85%, transparent);
}
.topbar-inner {
  width: 100%; max-width: var(--max); padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between;
}

h1.logo {
  font-size: inherit; font-weight: inherit; margin: 0;
}
.logo a { text-decoration: none; display: flex; align-items: baseline; gap: 6px; }
.logo-a {
  font-family: 'Fraunces', Georgia, serif;
  font-optical-sizing: auto; font-weight: 600;
  font-size: 1.65rem; letter-spacing: -0.03em;
  line-height: 1; color: var(--text);
}
.logo-b {
  font-family: 'Fraunces', Georgia, serif;
  font-optical-sizing: auto; font-weight: 200; font-style: italic;
  font-size: 1.65rem; letter-spacing: -0.02em;
  line-height: 1; color: var(--gold);
}

.nav-links {
  display: flex; gap: 4px; align-items: center;
}
.nav-links a {
  font-size: var(--xs); color: var(--text-2);
  text-decoration: none; letter-spacing: 0.03em;
  font-weight: 500;
  padding: 6px 12px; border-radius: 100px;
  transition: color .12s, background .12s;
  white-space: nowrap;
}
.nav-links a:hover { color: var(--text); background: var(--surface-2); }
.nav-links a.active {
  color: var(--gold); background: var(--gold-glow);
}
.nav-sep {
  width: 1px; height: 16px; background: var(--border);
  margin: 0 4px; flex-shrink: 0;
}

/* ── Header ──────────────────────────────────────────────────── */
header.page { padding-top: 40px; padding-bottom: 40px; }

.tagline {
  font-size: var(--sm); color: var(--text-3);
  letter-spacing: 0.01em; line-height: 1;
}

/* ── Main ────────────────────────────────────────────────────── */
main.page { padding-bottom: 86px; display: flex; flex-direction: column; gap: 40px; }

/* ── Section labels ──────────────────────────────────────────── */
.lbl {
  display: block;
  font-family: 'Fraunces', Georgia, serif;
  font-size: var(--xs); letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-2);
  font-weight: 600; margin-bottom: 12px;
}

/* ── Category chips ──────────────────────────────────────────── */
.cats { display: flex; flex-wrap: wrap; gap: 7px; }
.cat {
  padding: 7px 14px; background: none;
  border: 1px solid var(--border); border-radius: 100px;
  color: var(--text-2); font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--xs); letter-spacing: 0.03em; line-height: 1;
  cursor: pointer; user-select: none;
  transition: color .12s, border-color .12s, background .12s;
}
.cat:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-glow); }
.cat.active { color: var(--gold); border-color: var(--gold); background: var(--gold-glow); }

/* ── Prompt cards ────────────────────────────────────────────── */
.prompt-cards { display: flex; flex-direction: column; gap: 10px; }

.prompt-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px 18px;
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.prompt-card:hover { border-color: var(--border-2); background: var(--surface-2); }
.prompt-card.selected { border-color: var(--gold); background: var(--gold-glow); }

.prompt-card-title {
  font-size: var(--sm); font-weight: 500; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
}
.prompt-card-preview {
  font-size: var(--xs); color: var(--text-3);
  line-height: 1.5; white-space: pre-line;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.prompt-card.selected .prompt-card-preview {
  -webkit-line-clamp: unset;
  color: var(--text-2);
}

/* ── Textarea ────────────────────────────────────────────────── */
.prompt-wrap { position: relative; }
textarea {
  display: block; width: 100%; min-height: 210px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace; font-size: var(--base);
  line-height: 1.75; padding: 20px 20px 50px;
  resize: vertical; outline: none; caret-color: var(--gold);
  transition: border-color .18s, box-shadow .18s;
}
textarea::placeholder { color: var(--text-3); font-style: italic; }
textarea:hover { border-color: var(--border-2); }
textarea:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }

.prompt-meta {
  position: absolute; bottom: 15px; left: 20px; right: 20px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.char-count {
  font-size: var(--xs); color: var(--text-3);
  font-variant-numeric: tabular-nums; transition: color .2s;
}
.char-count.warn { color: #c97a40; }

/* ── Provider cards ──────────────────────────────────────────── */
.providers {
  list-style: none;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.p-btn {
  width: 100%; display: flex; flex-direction: column;
  align-items: flex-start; gap: 10px; padding: 14px 14px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace; cursor: pointer;
  transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;
  text-align: left; position: relative; overflow: hidden;
}
.p-btn:hover {
  background: var(--surface-2); border-color: var(--border-2);
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.18);
}
.p-btn:active { transform: translateY(0); box-shadow: none; }
.p-dot {
  width: 28px; height: 4px; border-radius: 2px;
  background: var(--pc, var(--border)); opacity: .65;
  transition: opacity .12s, width .12s;
}
.p-btn:hover .p-dot { opacity: 1; width: 36px; }
.p-name { font-size: var(--sm); letter-spacing: 0.02em; line-height: 1; }
.p-arrow {
  position: absolute; top: 12px; right: 12px;
  font-size: 11px; color: var(--text-3); line-height: 1;
  transition: transform .12s, color .12s;
}
.p-btn:hover .p-arrow { transform: translate(2px,-2px); color: var(--text-2); }

.pc-chatgpt    { --pc: var(--chatgpt); }
.pc-claude     { --pc: var(--claude); }
.pc-gemini     { --pc: var(--gemini); }
.pc-copilot    { --pc: var(--copilot); }
.pc-perplexity { --pc: var(--perplexity); }
.pc-lechat     { --pc: var(--lechat); }
.pc-grok       { --pc: var(--grok); }
.pc-deepseek   { --pc: var(--deepseek); }

/* ── Actions row ─────────────────────────────────────────────── */
.actions { display: flex; gap: 8px; }

.btn {
  padding: 14px 20px; background: none;
  border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text-2); font-family: 'DM Mono', 'Courier New', monospace;
  font-size: var(--sm); letter-spacing: 0.04em;
  cursor: pointer; line-height: 1; white-space: nowrap;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  transition: border-color .12s, color .12s;
}
.btn:hover { border-color: var(--border-2); color: var(--text); }
.btn.flex-1 { flex: 1; }
.btn.copied { border-color: var(--gold-dim); color: var(--gold); }

/* ── Toast ───────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(64px);
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: var(--r); padding: 11px 20px;
  font-size: var(--sm); letter-spacing: 0.02em; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  transition: transform .26s cubic-bezier(.34,1.56,.64,1);
  z-index: 200; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Footer ──────────────────────────────────────────────────── */
footer {
  width: 100%; border-top: 1px solid var(--border);
  display: flex; justify-content: center; margin-top: 8px;
}
.footer-inner {
  width: 100%; max-width: var(--max);
  padding: 36px 28px 48px;
  display: flex; flex-direction: column; gap: 24px;
}
.footer-section { display: flex; flex-direction: column; gap: 12px; }
.footer-heading {
  font-family: 'Fraunces', Georgia, serif;
  font-size: var(--xs); font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-2);
}
.footer-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px 16px;
}
.footer-grid a {
  font-size: var(--xs); color: var(--text-3);
  text-decoration: none; letter-spacing: 0.02em;
  padding: 4px 0; transition: color .12s;
}
.footer-grid a:hover { color: var(--gold); }
.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.footer-links {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.footer-links a {
  font-size: var(--xs); color: var(--text-2);
  text-decoration: none; font-weight: 500;
  letter-spacing: 0.02em; transition: color .12s;
}
.footer-links a:hover { color: var(--gold); }
.footer-copy { font-size: var(--xs); color: var(--text-3); }
.footer-doodle {
  display: block; margin: 4px auto 0; width: 180px; height: auto;
  opacity: .18; transition: opacity .3s;
}
.footer-doodle:hover { opacity: .35; }

/* ── Reduced motion ──────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: .01ms !important; }
  .toast { transition: none !important; }
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 580px) {
  .providers { grid-template-columns: repeat(2, 1fr); }
  main.page { gap: 36px; }
  .actions { flex-wrap: wrap; }
  .actions .btn.flex-1 { flex: 0 0 100%; }
}
@media (max-width: 360px) {
  .page, .footer-inner { padding-left: 16px; padding-right: 16px; }
}
</style>

<script>
'use strict';

/* ── Student prompt library ─────────────────────────────────── */
const DEV_PROMPTS = [
  {
    cat: 'Studying',
    prompts: [
      { title: 'Create study guide for topic', text: "Create a comprehensive study guide for [topic].\n\nInclude:\n- Key concepts and definitions\n- Important dates, formulas, or names to memorize\n- Common misconceptions to watch out for\n- A quick summary I can review before an exam\n\nLevel: [beginner / intermediate / advanced]" },
      { title: 'Explain concept with analogies', text: "Explain [concept] to me using clear, everyday analogies.\n\nI'm a [year/level] student studying [subject]. I understand [related concept] but I'm struggling with this one.\n\nUse at least two different analogies and check my understanding at the end with a quick question." },
      { title: 'Generate flashcard Q&As', text: "Generate 10 flashcard question-and-answer pairs for the following topic:\n\n[topic or paste notes here]\n\nFormat each card as:\nQ: [question]\nA: [concise answer]\n\nMix factual recall, conceptual understanding, and application questions." },
      { title: 'Summarize textbook chapter', text: "Summarize the following textbook chapter into clear, concise notes.\n\n[paste chapter text here]\n\nOrganize the summary with:\n- Main idea (1–2 sentences)\n- Key points (bullet list)\n- Terms to know (with definitions)\n- Things likely to appear on an exam" },
    ]
  },
  {
    cat: 'Writing Essays',
    prompts: [
      { title: 'Essay outline generator', text: "Generate a detailed essay outline for the following prompt:\n\n[essay prompt]\n\nCourse: [course name]\nWord count target: [e.g. 1500 words]\nArgument style: [persuasive / analytical / compare & contrast / expository]\n\nInclude a thesis statement, topic sentences for each body paragraph, and supporting points." },
      { title: 'Thesis statement workshop', text: "Help me craft a strong thesis statement for my essay.\n\nTopic: [topic]\nMy initial idea or argument: [describe your rough idea]\nAssignment type: [argumentative / analytical / research]\n\nProvide three different thesis statement options ranging from safe to bold, with a brief note on the strength of each." },
      { title: 'Strengthen my argument', text: "Review this paragraph from my essay and help me strengthen the argument.\n\n[paste paragraph here]\n\nSpecifically:\n1. Is the claim clear and defensible?\n2. Is the evidence well-integrated?\n3. Does the analysis explain the 'so what'?\n\nRewrite the paragraph with your improvements and explain each change." },
      { title: 'Write introduction paragraph', text: "Write an engaging introduction paragraph for my essay.\n\nTopic: [topic]\nThesis: [your thesis statement]\nAudience: [e.g. professor, general reader]\nTone: [academic / semi-formal]\n\nStart with a hook, provide brief context, and end with the thesis. Then give me one alternative opening hook." },
    ]
  },
  {
    cat: 'Research',
    prompts: [
      { title: 'Research question refinement', text: "Help me refine my research question.\n\nCurrent question: [your draft question]\nSubject area: [field of study]\nScope: [e.g. undergraduate paper, 3000 words, one semester]\n\nIs it too broad, too narrow, or well-scoped? Suggest three refined versions and explain why each is stronger." },
      { title: 'Literature review summary', text: "Summarize the key themes and debates in the literature on [topic].\n\nContext: I'm writing a [type of paper] for [course/level].\n\nCover:\n- Major schools of thought or theoretical frameworks\n- Key agreements and disagreements in the field\n- Gaps in the existing research\n- Suggested search terms for finding more sources" },
      { title: 'Find gaps in research', text: "I'm researching [topic]. Based on the following sources and notes, help me identify gaps in the existing research that my paper could address:\n\n[paste notes or source summaries here]\n\nWhat angles are underexplored? What questions remain unanswered? What would make a novel contribution?" },
      { title: 'Annotated bibliography entry', text: "Write an annotated bibliography entry for the following source.\n\nCitation: [full citation]\nSource summary: [paste abstract or key points]\nCitation style: [APA / MLA / Chicago]\n\nThe annotation should include: a brief summary (2–3 sentences), an assessment of credibility and relevance, and how I might use this source in my paper." },
    ]
  },
  {
    cat: 'Math & Science',
    prompts: [
      { title: 'Explain math concept step by step', text: "Explain [math concept] step by step as if I've never seen it before.\n\nMy current level: [e.g. high school algebra, first-year calculus]\nWhere I'm getting stuck: [describe the sticking point]\n\nWalk through the concept with a worked example, then give me a slightly harder example to try myself. Show me the solution after." },
      { title: 'Practice problem generator', text: "Generate 5 practice problems for [topic/concept].\n\nDifficulty: [easy / medium / hard]\nMy level: [e.g. AP Chemistry, university physics]\n\nPresent the problems first without solutions. Then, after a separator line, provide full step-by-step solutions for each." },
      { title: 'Lab report structure', text: "Help me structure a lab report for the following experiment.\n\nExperiment: [describe what you did]\nSubject: [e.g. Biology, Chemistry, Physics]\nInstitution level: [high school / undergraduate]\n\nProvide the standard sections (Title, Abstract, Introduction, Methods, Results, Discussion, Conclusion) with bullet points on what to include in each, and common mistakes to avoid." },
      { title: 'Scientific method walkthrough', text: "Walk me through applying the scientific method to the following question:\n\nResearch question: [your question]\nSubject area: [biology / chemistry / physics / other]\n\nFor each step — observation, hypothesis, experiment design, data collection, analysis, and conclusion — explain what I should do and why. Flag any ethical considerations if relevant." },
    ]
  },
  {
    cat: 'Languages',
    prompts: [
      { title: 'Grammar explanation with examples', text: "Explain the following grammar rule in [language] clearly and concisely.\n\nGrammar point: [e.g. subjunctive mood, passive voice, particle usage]\nMy level: [A1 / A2 / B1 / B2 / C1]\n\nProvide:\n- A plain-language explanation of the rule\n- 5 example sentences with translations\n- The most common mistakes learners make\n- A quick practice exercise" },
      { title: 'Vocabulary in context', text: "Help me learn the following [language] vocabulary in context.\n\nWords: [list words here]\n\nFor each word provide:\n- Definition in English\n- Example sentence in [language] with translation\n- A note on register (formal / informal / slang)\n- A common collocation or phrase it appears in\n\nThen create a short paragraph that uses all the words naturally." },
      { title: 'Translation with nuance notes', text: "Translate the following text from [source language] to [target language].\n\n[paste text here]\n\nAfter the translation, add nuance notes explaining:\n- Any words or phrases that don't translate directly\n- Cultural references that may need context\n- Alternative translations where the meaning is ambiguous\n- Register or tone differences between the original and translation" },
      { title: 'Conversation practice dialogue', text: "Write a realistic practice dialogue in [language] for the following scenario:\n\nScenario: [e.g. ordering food at a restaurant, asking for directions, a job interview]\nMy level: [A1 / A2 / B1 / B2 / C1]\n\nInclude:\n- The full dialogue between two speakers\n- An English translation below each line\n- Vocabulary notes for key words and phrases\n- Two follow-up questions I could use to extend the conversation" },
    ]
  },
  {
    cat: 'Exam Prep',
    prompts: [
      { title: 'Practice exam questions', text: "Generate 10 practice exam questions for [subject/topic].\n\nExam format: [multiple choice / short answer / essay / mixed]\nLevel: [e.g. GCSE, A-level, first-year university]\nTopics to focus on: [list key topics]\n\nAfter the questions, provide an answer key with brief explanations for each correct answer." },
      { title: 'Explain wrong answer', text: "I got this exam question wrong. Help me understand why.\n\nQuestion: [paste question]\nMy answer: [what you wrote or chose]\nCorrect answer: [the right answer]\n\nExplain:\n1. Why my answer is incorrect\n2. Why the correct answer is right\n3. The underlying concept I need to understand\n4. A similar practice question to test my understanding now" },
      { title: 'Memory techniques for topic', text: "Give me effective memory techniques to remember [topic/information].\n\nContent to memorize: [paste content, list, or concept]\nExam date: [how far away]\nLearning style preference: [visual / verbal / pattern-based / doesn't matter]\n\nProvide at least three different techniques (e.g. mnemonics, method of loci, chunking) with specific examples applied to this content." },
      { title: 'Last-minute review checklist', text: "Create a last-minute review checklist for my upcoming exam.\n\nSubject: [subject]\nExam is in: [e.g. 24 hours, 3 days]\nTopics covered: [list main topics]\nFormat: [multiple choice / essay / problem-solving]\n\nPrioritize what to review first, flag the highest-yield concepts, and include a short list of common mistakes to avoid going into the exam." },
    ]
  },
];

/* ── State ───────────────────────────────────────────────────── */
let activeCat = 'All';
let selectedCard = null;

/* ── DOM refs ────────────────────────────────────────────────── */
const catsEl       = document.getElementById('cats');
const cardsEl      = document.getElementById('prompt-cards');
const promptEl     = document.getElementById('prompt');
const providersEl  = document.getElementById('providers');
const charCountEl  = document.getElementById('charCount');
const copyBtn      = document.getElementById('copyBtn');
const clearBtnEl   = document.getElementById('clearBtn');
const toastEl      = document.getElementById('toast');

/* ── Render categories ──────────────────────────────────────── */
function renderCats() {
  const cats = ['All', ...DEV_PROMPTS.map(c => c.cat)];
  catsEl.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat' + (activeCat === cat ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCat = cat;
      selectedCard = null;
      renderCats();
      renderCards();
    });
    catsEl.appendChild(btn);
  });
}

/* ── Render prompt cards ────────────────────────────────────── */
function renderCards() {
  cardsEl.innerHTML = '';
  const groups = activeCat === 'All' ? DEV_PROMPTS : DEV_PROMPTS.filter(c => c.cat === activeCat);

  groups.forEach(group => {
    if (activeCat === 'All') {
      const catLabel = document.createElement('span');
      catLabel.className = 'lbl';
      catLabel.textContent = group.cat;
      catLabel.style.marginTop = cardsEl.children.length ? '20px' : '0';
      cardsEl.appendChild(catLabel);
    }

    group.prompts.forEach(p => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      card.innerHTML = `<div class="prompt-card-title">${p.title}</div><div class="prompt-card-preview">${escHtml(p.text)}</div>`;
      card.addEventListener('click', () => {
        const wasSelected = selectedCard === p;
        document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));

        if (wasSelected) {
          selectedCard = null;
          promptEl.value = '';
        } else {
          selectedCard = p;
          card.classList.add('selected');
          promptEl.value = p.text;
          promptEl.focus();
        }
        updateCount();
      });
      cardsEl.appendChild(card);
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Providers ──────────────────────────────────────────────── */
const enc = s => encodeURIComponent(s);
const providers = [
  { id: 'chatgpt',    label: 'ChatGPT',    cls: 'pc-chatgpt',    url: q => `https://chatgpt.com/?q=${enc(q)}` },
  { id: 'claude',     label: 'Claude',     cls: 'pc-claude',     url: q => `https://claude.ai/new?q=${enc(q)}` },
  { id: 'gemini',     label: 'Gemini',     cls: 'pc-gemini',     url: q => `https://gemini.google.com/app?q=${enc(q)}` },
  { id: 'copilot',    label: 'Copilot',    cls: 'pc-copilot',    url: q => `https://copilot.microsoft.com/?q=${enc(q)}` },
  { id: 'perplexity', label: 'Perplexity', cls: 'pc-perplexity', url: q => `https://www.perplexity.ai/search?q=${enc(q)}` },
  { id: 'lechat',     label: 'Le Chat',    cls: 'pc-lechat',     url: q => `https://chat.mistral.ai/chat?q=${enc(q)}` },
  { id: 'grok',       label: 'Grok',       cls: 'pc-grok',       url: q => `https://x.com/i/grok?text=${enc(q)}` },
  { id: 'deepseek',   label: 'DeepSeek',   cls: 'pc-deepseek',   url: q => `https://chat.deepseek.com/?q=${enc(q)}` },
];

providers.forEach(p => {
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.type = 'button'; btn.className = `p-btn ${p.cls}`;
  btn.setAttribute('aria-label', `Open in ${p.label}`);
  btn.innerHTML = `<span class="p-dot" aria-hidden="true"></span><span class="p-name">${p.label}</span><span class="p-arrow" aria-hidden="true">&nearr;</span>`;
  btn.addEventListener('click', () => openProvider(p));
  li.appendChild(btn); providersEl.appendChild(li);
});

/* ── Core actions ────────────────────────────────────────────── */
function getPrompt() { return promptEl.value.trim(); }

function openProvider(p) {
  const q = getPrompt();
  if (!q) { showToast('Write a prompt first'); return; }
  const w = window.open(p.url(q), '_blank', 'noopener,noreferrer');
  if (!w) showToast('Popup blocked — copy & paste instead');
}

function updateCount() {
  const n = promptEl.value.length;
  charCountEl.textContent = n > 0 ? n.toLocaleString() : '';
  charCountEl.classList.toggle('warn', n > 3000);
}

promptEl.addEventListener('input', () => {
  updateCount();
  if (!promptEl.value) {
    selectedCard = null;
    document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));
  }
});

copyBtn.addEventListener('click', async () => {
  const q = getPrompt();
  if (!q) { showToast('Nothing to copy yet'); return; }
  try {
    await navigator.clipboard.writeText(q);
    copyBtn.textContent = '\u2713 Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'Copy to clipboard';
      copyBtn.classList.remove('copied');
    }, 2200);
  } catch { showToast('Copy failed — try manually'); }
});

clearBtnEl.addEventListener('click', () => {
  promptEl.value = ''; updateCount();
  selectedCard = null;
  document.querySelectorAll('.prompt-card').forEach(c => c.classList.remove('selected'));
  promptEl.focus();
});

/* ── Keyboard shortcuts ──────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.activeElement === promptEl) {
    clearBtnEl.click(); return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'c' && document.activeElement === promptEl && !window.getSelection()?.toString()) {
    e.preventDefault(); copyBtn.click();
  }
});

/* ── Toast ───────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

/* ── Init ────────────────────────────────────────────────────── */
renderCats();
renderCards();

/* ── Service Worker ──────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
